<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Map Mobile</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(15, 20, 28, 0.95);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-red: #ff4b4b;
            --text-main: #ffffff;
            --sun-color: #ff6b6b;
            --sat-color: #4da3ff;
            
            /* マップカラーを更新 */
            --color-sp: linear-gradient(180deg, #103c4a 0%, #0a212a 100%); /* Storm Point */
            --color-we: linear-gradient(180deg, #4a2a1a 0%, #26150d 100%); /* World's Edge */
            --color-ol: linear-gradient(180deg, #2a4c6e 0%, #15283b 100%); /* Olympus */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .month-container {
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .month-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-red);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .weekday-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #71717a;
            padding-bottom: 8px;
        }

        .weekday-label:nth-child(1) { color: var(--sun-color); }
        .weekday-label:nth-child(7) { color: var(--sat-color); }

        .day-cell {
            aspect-ratio: 1 / 1.3;
            border-radius: 8px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .date-number {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .map-name {
            font-size: 0.55rem;
            font-weight: 800;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 2px 0;
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* マップ背景クラスを更新 */
        .map-SP { background: var(--color-sp); }
        .map-WE { background: var(--color-we); }
        .map-OL { background: var(--color-ol); }

        /* 今日の強調 */
        .is-today {
            outline: 2px solid var(--accent-red);
            z-index: 2;
        }
        
        .is-today::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            border-style: solid;
            border-width: 0 15px 15px 0;
            border-color: transparent var(--accent-red) transparent transparent;
        }

        .sun-text { color: var(--sun-color); }
        .sat-text { color: var(--sat-color); }
        .empty-cell { opacity: 0; }

        @media (max-width: 360px) {
            .date-number { font-size: 0.8rem; }
            .map-name { font-size: 0.5rem; transform: scale(0.9); }
        }
    </style>
</head>
<body>

<div id="calendar-app"></div>

<script>
    // マップローテーションを更新
    const maps = [
        { name: "Storm Point", code: "SP" },
        { name: "World's Edge", code: "WE" },
        { name: "Olympus", code: "OL" }
    ];

    // 今日（2026年3月26日）をストームポイント(インデックス0)の基準日に設定
    const baseDate = new Date(2026, 2, 26); 
    const today = new Date();

    function generateCalendar(year, month) {
        const app = document.getElementById('calendar-app');
        const container = document.createElement('div');
        container.className = 'month-container';
        
        const dateObj = new Date(year, month);
        const monthTitle = dateObj.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' });

        let html = `<div class="month-title">${monthTitle}</div>`;
        html += `<div class="calendar-grid">`;
        ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => {
            html += `<div class="weekday-label">${d}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // 空白
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="day-cell empty-cell"></div>`;
        }

        // 日付
        for (let d = 1; d <= daysInMonth; d++) {
            const current = new Date(year, month, d);
            const diff = Math.floor((current.getTime() - baseDate.getTime()) / (86400000));
            
            let mIdx = diff % maps.length;
            if (mIdx < 0) mIdx += maps.length;
            const map = maps[mIdx];
            
            const isToday = current.toDateString() === today.toDateString() ? 'is-today' : '';
            const dayOfWeek = current.getDay();
            let dateClass = '';
            if (dayOfWeek === 0) dateClass = 'sun-text';
            if (dayOfWeek === 6) dateClass = 'sat-text';

            html += `
                <div class="day-cell map-${map.code} ${isToday}">
                    <div class="date-number ${dateClass}">${d}</div>
                    <div class="map-name">${map.name.split(' ')[0]}<br>${map.name.split(' ')[1] || ''}</div>
                </div>
            `;
        }

        html += `</div>`;
        container.innerHTML = html;
        app.appendChild(container);
    }

    // 2026年3月と4月を表示
    generateCalendar(2026, 2);
    generateCalendar(2026, 3);
</script>

</body>
</html>
