<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Map Mobile - Season 2026</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(15, 20, 28, 0.95);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-red: #ff4b4b;
            --text-main: #ffffff;
            --sun-color: #ff6b6b;
            --sat-color: #4da3ff;
            
            /* マップカラー設定 */
            --color-we: linear-gradient(180deg, #4a2a1a 0%, #26150d 100%); /* World's Edge */
            --color-ed: linear-gradient(180deg, #2a1a4a 0%, #150d26 100%); /* E-District */
            --color-ol: linear-gradient(180deg, #2a4c6e 0%, #15283b 100%); /* Olympus */
            --color-event: #ffcc00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .month-container {
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .month-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-red);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .weekday-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #71717a;
            padding-bottom: 8px;
        }

        .weekday-label:nth-child(1) { color: var(--sun-color); }
        .weekday-label:nth-child(7) { color: var(--sat-color); }

        .day-cell {
            aspect-ratio: 1 / 1.3;
            border-radius: 8px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .date-number {
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 1;
        }

        .map-name {
            font-size: 0.5rem;
            font-weight: 800;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 2px 0;
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 1;
        }

        .event-tag {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--color-event);
            color: #000;
            font-size: 0.45rem;
            font-weight: 900;
            text-align: center;
            padding: 1px 0;
            transform: translateY(0);
        }

        /* マップ背景 */
        .map-WE { background: var(--color-we); }
        .map-ED { background: var(--color-ed); border: 1px solid rgba(147, 51, 234, 0.3); }
        .map-OL { background: var(--color-ol); }

        /* 今日の強調 */
        .is-today {
            outline: 2px solid var(--accent-red);
            z-index: 2;
        }
        
        .is-today::after {
            content: "TODAY";
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.4rem;
            background: var(--accent-red);
            padding: 1px 3px;
            border-radius: 2px;
        }

        .sun-text { color: var(--sun-color); }
        .sat-text { color: var(--sat-color); }
        .empty-cell { opacity: 0; }

        @media (max-width: 360px) {
            .date-number { font-size: 0.8rem; }
            .map-name { font-size: 0.45rem; transform: scale(0.9); }
        }
    </style>
</head>
<body>

<div id="calendar-app"></div>

<script>
    // マップローテーション設定
    const maps = [
        { name: "World's Edge", code: "WE" },
        { name: "E-District", code: "ED" },
        { name: "Olympus", code: "OL" }
    ];

    // 基準日: 2026年4月28日 (World's Edge)
    const baseDate = new Date(2026, 3, 28); 
    const today = new Date();

    function generateCalendar(year, month) {
        const app = document.getElementById('calendar-app');
        const container = document.createElement('div');
        container.className = 'month-container';
        
        const dateObj = new Date(year, month);
        const monthTitle = dateObj.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' });

        let html = `<div class="month-title">${monthTitle}</div>`;
        html += `<div class="calendar-grid">`;
        ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => {
            html += `<div class="weekday-label">${d}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // 空白セル
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="day-cell empty-cell"></div>`;
        }

        // 日付セル
        for (let d = 1; d <= daysInMonth; d++) {
            const current = new Date(year, month, d);
            const diff = Math.floor((current.getTime() - baseDate.getTime()) / (86400000));
            
            let mIdx = diff % maps.length;
            if (mIdx < 0) mIdx += maps.length;
            const map = maps[mIdx];
            
            const isToday = current.toDateString() === today.toDateString() ? 'is-today' : '';
            const dayOfWeek = current.getDay();
            let dateClass = '';
            if (dayOfWeek === 0) dateClass = 'sun-text';
            if (dayOfWeek === 6) dateClass = 'sat-text';

            // シーズン切り替え日(5月2日)の判定
            const isSeasonChange = (year === 2026 && month === 4 && d === 2);

            html += `
                <div class="day-cell map-${map.code} ${isToday}">
                    <div class="date-number ${dateClass}">${d}</div>
                    <div class="map-name">${map.name.split(' ')[0]}<br>${map.name.split(' ')[1] || ''}</div>
                    ${isSeasonChange ? '<div class="event-tag">SEASON UPDATE</div>' : ''}
                </div>
            `;
        }

        html += `</div>`;
        container.innerHTML = html;
        app.appendChild(container);
    }

    // 2026年4月と5月を表示
    generateCalendar(2026, 3); // 4月
    generateCalendar(2026, 4); // 5月
</script>

</body>
</html>
